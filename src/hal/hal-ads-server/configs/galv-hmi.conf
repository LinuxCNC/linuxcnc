# HAL-ADS symbol mapping for GalvPLC DISPLAY_DATA GVL.
#
# Struct layout (ST_DISP_DATA, ST_DISP_ERRORS, etc.) matches the TwinCAT PLC
# type definitions.  No manual padding is required: the server automatically
# inserts struct-start and struct-end alignment padding so that symbol offsets
# match TwinCAT's natural (C-compiler-style) alignment.
#
# Direction convention:
#   out  – HAL component produces the value  (HMI reads from HAL / PLC)
#   in   – HAL component receives the value  (HMI writes  to  HAL / PLC)
#
# @enum directives map TwinCAT enum type names to their base ADS type, GUID, and
# member values.  They must appear before the symbol tree (at depth 0).  Indented
# lines following the header define enum members; a member without an explicit
# value auto-increments from the previous value.
#
# @struct directives declare named struct types with their GUIDs and member
# definitions.  They must also appear at depth 0.  Indented lines following
# the header define the struct members using the same syntax as the tree.

@enum EN_DISP_MSGTYPE WORD 96656ea5-0db7-49b0-86ec-56cef26b56d0
  none 0
  precheck
  finishedOk
  finishedWarn
  StopReq

