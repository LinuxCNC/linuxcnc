# HAL-ADS symbol mapping for GalvPLC DISPLAY_DATA GVL.
#
# Struct layout (ST_DISP_DATA, ST_DISP_ERRORS, etc.) matches the TwinCAT PLC
# type definitions.  No manual padding is required: the server automatically
# inserts struct-start and struct-end alignment padding so that symbol offsets
# match TwinCAT's natural (C-compiler-style) alignment.
#
# Direction convention:
#   out  – HAL component produces the value  (HMI reads from HAL / PLC)
#   in   – HAL component receives the value  (HMI writes  to  HAL / PLC)
#
# @type directives map TwinCAT-derived type names to their base ADS type and
# data-type GUID.  They must appear before the symbol tree (at depth 0).

@type EN_DISP_MSGTYPE WORD 96656ea5-0db7-49b0-86ec-56cef26b56d0
@type EN_DISP_POOL_STATE WORD 4bb8098e-6846-4a59-915d-71a3e3d369c0

DISPLAY_DATA
  stData
    inout dtCurrentTime DT
    in bGlobalErr BOOL
    out bAckErr BOOL
    aPools[1..1]
      in sPoolName STRING(31)
      in nFormulaId DWORD
      in sFormulaName STRING(31)
      in eState EN_DISP_POOL_STATE
      in fTemp REAL
      in fCurrent REAL
      in fVoltage REAL
      in fTiltPos REAL
      in fTiltVelo REAL
      in fSectPos REAL
      in fSectVelo REAL
      in fLeakPress REAL
      in tProcTimeTotal TIME
      in tProcTimeRem TIME
      in tPhaseTimeTotal TIME
      in tPhaseTimeRem TIME
      in nShiftCurr WORD
      in nShiftCount WORD
      in nRepeatCurr WORD
      in nRepeatCount WORD
      inout fTempSetpoint REAL
      inout bPumpOnIdle BOOL
      inout tMixerTimeManual TIME
      inout tMixerTimeAuto TIME
      in bManuEnable BOOL
      out bFormStart BOOL
      out bFormStop BOOL
      out bFormPause BOOL
      out bTiltJogPos BOOL
      out bTiltJogNeg BOOL
      out bSectJogNeg BOOL
      stMsg
        in eType EN_DISP_MSGTYPE
        in bEnableOk BOOL
        in bEnableCancel BOOL
        out bOk BOOL
        out bCancel BOOL
      aMixers[1..4]
        in fPower REAL
        out bManu BOOL
  stErrors
    stGlobalErrors
      in bEmergStop BOOL
      in bDriveSupplyErr BOOL
      in bTempWarn BOOL
      in bTempErr BOOL
    aPoolErrors[1..1]
