# HAL-ADS symbol mapping for GalvPLC DISPLAY_DATA GVL.
#
# Struct layout (ST_DISP_DATA, ST_DISP_ERRORS, etc.) matches the TwinCAT PLC
# type definitions.  Padding fields use the "pad" direction to occupy the
# correct byte offsets without creating HAL pins.
#
# Direction convention:
#   out  – HAL component produces the value  (HMI reads from HAL / PLC)
#   in   – HAL component receives the value  (HMI writes  to  HAL / PLC)
#   pad  – alignment padding (no HAL pin, zero-filled on read, discarded on write)

DISPLAY_DATA
  stData
    inout dtCurrentTime DT
    in bGlobalErr BOOL
    out bAckErr BOOL
    pad _pad0 WORD
    aPools[1..1]
      in sPoolName STRING(31)
      in nFormulaId DWORD
      in sFormulaName STRING(31)
      in eState WORD
      pad _pad0 WORD
      in fTemp REAL
      in fCurrent REAL
      in fVoltage REAL
      in fTiltPos REAL
      in fTiltVelo REAL
      in fSectPos REAL
      in fSectVelo REAL
      in fLeakPress REAL
      in tProcTimeTotal TIME
      in tProcTimeRem TIME
      in tPhaseTimeTotal TIME
      in tPhaseTimeRem TIME
      in nShiftCurr WORD
      in nShiftCount WORD
      in nRepeatCurr WORD
      in nRepeatCount WORD
      inout fTempSetpoint REAL
      inout bPumpOnIdle BOOL
      pad _pad1 BYTE
      pad _pad2 WORD
      inout tMixerTimeManual TIME
      inout tMixerTimeAuto TIME
      in bManuEnable BOOL
      out bFormStart BOOL
      out bFormStop BOOL
      out bFormPause BOOL
      out bTiltJogPos BOOL
      out bTiltJogNeg BOOL
      out bSectJogNeg BOOL
      pad _pad3 BYTE
      stMsg
        in eType WORD
        in bEnableOk BOOL
        in bEnableCancel BOOL
        out bOk BOOL
        out bCancel BOOL
      pad _pad4 WORD
      aMixers[1..4]
        in fPower REAL
        out bManu BOOL
        pad _pad0 BYTE
        pad _pad1 WORD
  stErrors
    stGlobalErrors
      in bEmergStop BOOL
      in bDriveSupplyErr BOOL
      in bTempWarn BOOL
      in bTempErr BOOL
    aPoolErrors[1..1]
      in bHeaterTempWarn BOOL
      in bHeaterSensorErr BOOL
      in bHeaterSafetyErr BOOL
      in bTiltDriveWarn BOOL
      in bTiltDriveErr BOOL
      in bTiltFollowingErr BOOL
      in bSectDriveWarn BOOL
      in bSectDriveErr BOOL
      in bSectFollowingErr BOOL
      in bPsComErr BOOL
      in bPsTempWarn BOOL
      in bPsTempErr BOOL
      in bPsCurrErr BOOL
      in bPsVoltErr BOOL
      aMixerErrors[1..4]
        in bDriveWarn BOOL
        in bDriveErr BOOL
        in bOverloadErr BOOL
        in bUnderloadWarn BOOL
        in bVeloErr BOOL

