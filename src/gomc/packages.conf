# packages.conf — internal gomod package registry.
# Read by modcompile and filtered based on compiled-in BuildFlags.
# Lines with @GOMOD:<TAG>@ markers are conditionally included.
#
# Format: TYPE IMPORT_PATH
#
# TYPE:
#   gmi     — generated GMI dispatch package (compiled into gomc-server)
#   gomod   — Go module compiled into gomc-server
#
# IMPORT_PATH — relative path within the gomc module for blank import

# Core GMI dispatch entries are auto-added by "modcompile add-gmi"
# during code generation (see gmi/codegen/Submakefile).

# Go modules (in-tree and installed external)
gomod internal/adsmodule @GOMOD:ADSSERVER@
gomod internal/pyvcpmodule @GOMOD:PYVCP@
gomod internal/halscope @GOMOD:HALSCOPE@
gomod internal/classicladder @GOMOD:CLASSICLADDER@
gomod internal/emccalib @GOMOD:EMCCALIB@
gomod internal/haljson @GOMOD:HALJSON@
gomod internal/mqttbridge @GOMOD:MQTTBRIDGE@
gomod internal/ngcpreview @GOMOD:NGCPREVIEW@
gomod internal/task @GOMOD:MILLTASK_GO@
gomod internal/tasktest @GOMOD:TASKTEST@
gomod internal/persist_sqlite @GOMOD:PERSIST_SQLITE@
gomod internal/tooltable @GOMOD:TOOLTABLE@

