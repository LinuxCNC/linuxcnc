# Multi-instance demo: two independent CNC instances in one gomc-server.
# Instance "mill1" uses global sections (no namespace prefix).
# Instance "mill2" uses [mill2:SECTION] overrides where needed.

[EMC]
VERSION = 1.1
MACHINE = multiinst

[DISPLAY]
CYCLE_TIME = 0.100
MAX_FEED_OVERRIDE = 1.2
PROGRAM_PREFIX = ../../../nc_files/

[TASK]
TASK = milltask
CYCLE_TIME = 0.001

[RS274NGC]
PARAMETER_FILE = mill1.var

[mill2:RS274NGC]
PARAMETER_FILE = mill2.var

[EMCMOT]
EMCMOT = mot1
SERVO_PERIOD = 1000000

[mill2:EMCMOT]
EMCMOT = mot2

[EMCIO]
EMCIO = io1
CYCLE_TIME = 0.100
TOOL_TABLE = mill1.tbl

[mill2:EMCIO]
EMCIO = io2
TOOL_TABLE = mill2.tbl

[HAL]
HALFILE = LIB:threads.hal
HALFILE = multiinst.hal

[TRAJ]
COORDINATES = X Y Z
LINEAR_UNITS = mm
ANGULAR_UNITS = degree
DEFAULT_LINEAR_VELOCITY = 30
MAX_LINEAR_VELOCITY = 50
DEFAULT_LINEAR_ACCELERATION = 500
MAX_LINEAR_ACCELERATION = 500
SPINDLES = 1

[KINS]
KINEMATICS = trivkins
JOINTS = 3

[mill2:KINS]
KINEMATICS = trivkins
JOINTS = 3

[AXIS_X]
MAX_VELOCITY = 50
MAX_ACCELERATION = 500
MIN_LIMIT = -200
MAX_LIMIT = 200

[mill2:AXIS_X]
MIN_LIMIT = -300
MAX_LIMIT = 300

[mill2:JOINT_0]
MIN_LIMIT = -300
MAX_LIMIT = 300

[AXIS_Y]
MAX_VELOCITY = 50
MAX_ACCELERATION = 500
MIN_LIMIT = -200
MAX_LIMIT = 200

[AXIS_Z]
MAX_VELOCITY = 50
MAX_ACCELERATION = 500
MIN_LIMIT = -50
MAX_LIMIT = 100

[JOINT_0]
TYPE = LINEAR
HOME = 0.0
MAX_VELOCITY = 50
MAX_ACCELERATION = 500
MIN_LIMIT = -200
MAX_LIMIT = 200
FERROR = 1.0
MIN_FERROR = 0.25
HOME_SEARCH_VEL = 0
HOME_LATCH_VEL = 0
HOME_SEQUENCE = 0

[JOINT_1]
TYPE = LINEAR
HOME = 0.0
MAX_VELOCITY = 50
MAX_ACCELERATION = 500
MIN_LIMIT = -200
MAX_LIMIT = 200
FERROR = 1.0
MIN_FERROR = 0.25
HOME_SEARCH_VEL = 0
HOME_LATCH_VEL = 0
HOME_SEQUENCE = 0

[JOINT_2]
TYPE = LINEAR
HOME = 0.0
MAX_VELOCITY = 50
MAX_ACCELERATION = 500
MIN_LIMIT = -50
MAX_LIMIT = 100
FERROR = 1.0
MIN_FERROR = 0.25
HOME_SEARCH_VEL = 0
HOME_LATCH_VEL = 0
HOME_SEQUENCE = 0
