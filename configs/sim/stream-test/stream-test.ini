# stream-test — end-to-end test for sampler/streamer cmod + WebSocket pipeline
#
# This config runs in HAL-only mode (no TASK section).  It loads a sampler
# and streamer with a simple pin configuration, wires a siggen to the
# sampler inputs, and routes the streamer outputs through halscope-friendly
# names.
#
# Usage (RIP):
#   gomc-server configs/sim/stream-test/stream-test.ini
#
# Then in another terminal:
#   halsampler sampler.0        # prints captured siggen data
#   echo "1.5 2 3 0" | halstreamer streamer.0   # pushes data to HAL pins

[EMC]
VERSION = 1.1
MACHINE = stream-test

[HAL]
HALFILE = LIB:threads.hal
HALFILE = stream-test.hal

[EMCMOT]
SERVO_PERIOD = 1000000
