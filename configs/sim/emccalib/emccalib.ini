# Simulated servo machine for testing emccalib calibration tuning.
# Uses PID controllers with INI-referenced gains.

[EMC]
VERSION = 1.1
MACHINE = emccalib-test
DEBUG = 0

[DISPLAY]
DISPLAY = axis
CYCLE_TIME = 0.100
POSITION_OFFSET = RELATIVE
POSITION_FEEDBACK = ACTUAL
MAX_FEED_OVERRIDE = 1.2
MAX_LINEAR_VELOCITY = 50
DEFAULT_LINEAR_VELOCITY = 5
PROGRAM_PREFIX = ../../nc_files/

[TASK]
TASK = milltask
CYCLE_TIME = 0.001

[RS274NGC]
PARAMETER_FILE = sim.var

[EMCMOT]
EMCMOT = motmod
COMM_TIMEOUT = 1.0
SERVO_PERIOD = 1000000

[KINS]
KINEMATICS = trivkins coordinates=XYZ
JOINTS = 3

[HAL]
HALFILE = LIB:threads.hal
HALFILE = servo_sim.hal
HALFILE = emccalib.hal

[TRAJ]
COORDINATES = X Y Z
LINEAR_UNITS = mm
ANGULAR_UNITS = degree
MAX_LINEAR_VELOCITY = 50
DEFAULT_LINEAR_VELOCITY = 5

[EMCIO]
EMCIO = io
CYCLE_TIME = 0.100
TOOL_TABLE = tool.tbl

# --- Joint 0 (X axis) ---
[JOINT_0]
TYPE = LINEAR
MAX_VELOCITY = 50
MAX_ACCELERATION = 500
MIN_LIMIT = -100
MAX_LIMIT = 100
FERROR = 10.0
MIN_FERROR = 1.0
HOME = 0.0
HOME_OFFSET = 0.0
HOME_SEARCH_VEL = 0
HOME_LATCH_VEL = 0
HOME_SEQUENCE = 1
# PID tuning parameters
P = 50.0
I = 0.0
D = 0.1
BIAS = 0.0
FF0 = 0.0
FF1 = 1.0
FF2 = 0.0
DEADBAND = 0.0
MAX_OUTPUT = 0
MAX_ERROR = 0.005

# --- Joint 1 (Y axis) ---
[JOINT_1]
TYPE = LINEAR
MAX_VELOCITY = 50
MAX_ACCELERATION = 500
MIN_LIMIT = -100
MAX_LIMIT = 100
FERROR = 10.0
MIN_FERROR = 1.0
HOME = 0.0
HOME_OFFSET = 0.0
HOME_SEARCH_VEL = 0
HOME_LATCH_VEL = 0
HOME_SEQUENCE = 1
# PID tuning parameters
P = 50.0
I = 0.0
D = 0.0
BIAS = 0.0
FF0 = 0.0
FF1 = 1.0
FF2 = 0.0
DEADBAND = 0.0
MAX_OUTPUT = 0
MAX_ERROR = 0.005

# --- Joint 2 (Z axis) ---
[JOINT_2]
TYPE = LINEAR
MAX_VELOCITY = 25
MAX_ACCELERATION = 250
MIN_LIMIT = -50
MAX_LIMIT = 0
FERROR = 10.0
MIN_FERROR = 1.0
HOME = 0.0
HOME_OFFSET = 0.0
HOME_SEARCH_VEL = 0
HOME_LATCH_VEL = 0
HOME_SEQUENCE = 0
# PID tuning parameters
P = 50.0
I = 0.0
D = 0.0
BIAS = 0.0
FF0 = 0.0
FF1 = 1.0
FF2 = 0.0
DEADBAND = 0.0
MAX_OUTPUT = 0
MAX_ERROR = 0.005

[AXIS_X]
MIN_LIMIT = -100
MAX_LIMIT = 100
MAX_VELOCITY = 50
MAX_ACCELERATION = 500

[AXIS_Y]
MIN_LIMIT = -100
MAX_LIMIT = 100
MAX_VELOCITY = 50
MAX_ACCELERATION = 500

[AXIS_Z]
MIN_LIMIT = -50
MAX_LIMIT = 0
MAX_VELOCITY = 25
MAX_ACCELERATION = 250
