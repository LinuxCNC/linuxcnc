# HAL-only demo config for testing the Go module loader.
#
# This config has no [TASK] section, so gomc-server runs in HAL-only
# mode: it starts the realtime environment, loads HAL files, starts threads,
# and then blocks until Ctrl+C.
#
# Usage (RIP):
#   cd examples/go-comp-template && make && make install
#   gomc-server configs/sim/go-plugin-test/go-plugin-test.ini
#
# gomc-server will load the Go module via the "load" HAL command, create
# its HAL pins, wire them, and wait for a shutdown signal.

[EMC]
VERSION = 1.1
MACHINE = go-plugin-test

[HAL]
HALFILE = LIB:threads.hal
HALFILE = go-plugin-test.hal

[EMCMOT]
SERVO_PERIOD = 1000000

[TRAJ]
COORDINATES = X
