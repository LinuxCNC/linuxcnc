# HAL-only demo config for testing the Go plugin loader.
#
# This config has no [TASK] section, so linuxcnc-launcher runs in HAL-only
# mode: it starts the realtime environment, loads HAL files, starts threads,
# and then blocks until Ctrl+C.
#
# Usage (RIP):
#   cd src/hal/hal-go-plugin-template && make && make install
#   linuxcnc-launcher configs/sim/go-plugin-test/go-plugin-test.ini
#
# The launcher will load the Go plugin via the "load" HAL command, create
# its HAL pins, wire them, and wait for a shutdown signal.

[EMC]
VERSION = 1.1
MACHINE = go-plugin-test

[HAL]
HALFILE = go-plugin-test.hal

[EMCMOT]
SERVO_PERIOD = 1000000

[TRAJ]
COORDINATES = X
