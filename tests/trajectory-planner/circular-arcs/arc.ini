# gomc circular-arc TP regression test (mm units, XYZ trivkins sim).
[EMC]
VERSION = 1.1
MACHINE = circular-arcs

[TASK]
TASK = milltask
CYCLE_TIME = 0.001

[RS274NGC]
PARAMETER_FILE = sim.var

[EMCMOT]
EMCMOT = motmod
BASE_PERIOD = 0
SERVO_PERIOD = 1000000

[HAL]
HALFILE = LIB:linuxcnc.hal
HALFILE = LIB:threads.hal
HALFILE = LIB:core_sim.hal
HALFILE = capture.hal

[TRAJ]
AXES = 3
COORDINATES = X Y Z
LINEAR_UNITS = mm
ANGULAR_UNITS = degree
DEFAULT_LINEAR_VELOCITY = 20
MAX_LINEAR_VELOCITY = 50
NO_FORCE_HOMING = 1

[EMCIO]
EMCIO = io
CYCLE_TIME = 0.100
TOOL_TABLE = tool.tbl

[KINS]
KINEMATICS = trivkins
JOINTS = 3

[AXIS_X]
MIN_LIMIT = -100.0
MAX_LIMIT = 100.0
MAX_VELOCITY = 50
MAX_ACCELERATION = 500.0

[AXIS_Y]
MIN_LIMIT = -100.0
MAX_LIMIT = 100.0
MAX_VELOCITY = 50
MAX_ACCELERATION = 500.0

[AXIS_Z]
MIN_LIMIT = -100.0
MAX_LIMIT = 100.0
MAX_VELOCITY = 50
MAX_ACCELERATION = 500.0

[JOINT_0]
TYPE = LINEAR
MAX_VELOCITY = 50
MAX_ACCELERATION = 500.0
MIN_LIMIT = -100.0
MAX_LIMIT = 100.0
FERROR = 0.050
MIN_FERROR = 0.010

[JOINT_1]
TYPE = LINEAR
MAX_VELOCITY = 50
MAX_ACCELERATION = 500.0
MIN_LIMIT = -100.0
MAX_LIMIT = 100.0
FERROR = 0.050
MIN_FERROR = 0.010

[JOINT_2]
TYPE = LINEAR
MAX_VELOCITY = 50
MAX_ACCELERATION = 500.0
MIN_LIMIT = -100.0
MAX_LIMIT = 100.0
FERROR = 0.050
MIN_FERROR = 0.010
