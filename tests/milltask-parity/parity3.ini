# 3-axis milltask parity config.
# Deliberately NON-UNIFORM per-axis limits (Z much slower than X/Y) so that the
# canon's per-axis velocity/acceleration blending (present in C++, absent in Go)
# produces a visible divergence in the captured motctl stream.

[EMC]
VERSION = 1.1
MACHINE = parity3
DEBUG = 0

[DISPLAY]
CYCLE_TIME = 0.100
MAX_FEED_OVERRIDE = 1.2
MAX_SPINDLE_OVERRIDE = 1.0
PROGRAM_PREFIX = corpus

[TASK]
TASK = milltask
CYCLE_TIME = 0.001

[RS274NGC]
PARAMETER_FILE = parity3.var

[EMCMOT]
EMCMOT = motmod
COMM_TIMEOUT = 1.0
SERVO_PERIOD = 1000000

[EMCIO]
EMCIO = io
CYCLE_TIME = 0.100
TOOL_TABLE = tool.tbl

[HAL]
HALFILE = LIB:linuxcnc.hal
HALFILE = LIB:threads.hal
HALFILE = parity3.hal

[TRAJ]
COORDINATES = X Y Z
LINEAR_UNITS = mm
ANGULAR_UNITS = degree
DEFAULT_LINEAR_VELOCITY = 20
MAX_LINEAR_VELOCITY = 40
SPINDLES = 1
DEFAULT_LINEAR_ACCELERATION = 300
MAX_LINEAR_ACCELERATION = 600

[KINS]
KINEMATICS = trivkins
JOINTS = 3

[AXIS_X]
MAX_VELOCITY = 40
MAX_ACCELERATION = 600
MIN_LIMIT = -254
MAX_LIMIT = 254

[AXIS_Y]
MAX_VELOCITY = 25
MAX_ACCELERATION = 400
MIN_LIMIT = -254
MAX_LIMIT = 254

[AXIS_Z]
MAX_VELOCITY = 8
MAX_ACCELERATION = 120
MIN_LIMIT = -50.8
MAX_LIMIT = 101.6

[JOINT_0]
TYPE = LINEAR
HOME = 0.0
MAX_VELOCITY = 40
MAX_ACCELERATION = 600
MIN_LIMIT = -254
MAX_LIMIT = 254
FERROR = 1.27
MIN_FERROR = 0.254
HOME_OFFSET = 0.0
HOME_SEQUENCE = 0

[JOINT_1]
TYPE = LINEAR
HOME = 0.0
MAX_VELOCITY = 25
MAX_ACCELERATION = 400
MIN_LIMIT = -254
MAX_LIMIT = 254
FERROR = 1.27
MIN_FERROR = 0.254
HOME_OFFSET = 0.0
HOME_SEQUENCE = 0

[JOINT_2]
TYPE = LINEAR
HOME = 0.0
MAX_VELOCITY = 8
MAX_ACCELERATION = 120
MIN_LIMIT = -50.8
MAX_LIMIT = 101.6
FERROR = 1.27
MIN_FERROR = 0.254
HOME_OFFSET = 0.0
HOME_SEQUENCE = 0
